<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Accrue — Manage Your Money" />
  <title>Accrue</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fredoka:wght@400;500;600&display=swap"
    rel="stylesheet"
  />

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #f8fafc;
      -webkit-font-smoothing: antialiased;
    }

    .font-fredoka {
      font-family: 'Fredoka', sans-serif;
    }

    /* Loading screen — shown until React mounts */
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
      gap: 16px;
      z-index: 9999;
    }

    #loading span {
      font-family: 'Fredoka', sans-serif;
      font-size: 28px;
      color: #6366f1;
      letter-spacing: 0.02em;
    }

    #loading .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e0e7ff;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Scrollbar */
    ::-webkit-scrollbar       { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    @keyframes gradient-x {
      0%, 100% { background-position: 0% 50%; }
      50%       { background-position: 100% 50%; }
    }

    .animate-gradient-x {
      background-size: 200% 200%;
      animation: gradient-x 3s ease infinite;
    }

    @keyframes spin-slow {
      to { transform: rotate(360deg); }
    }

    .animate-spin-slow {
      animation: spin-slow 20s linear infinite;
    }
  </style>
</head>
<body>

  <!-- Loading screen — hidden once React mounts -->
  <div id="loading">
    <span>Accrue</span>
    <div class="spinner"></div>
  </div>

  <div id="root"></div>

  <script type="module" src="/src/index.tsx"></script>

  <!-- Hide loading screen once React has mounted -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const observer = new MutationObserver(() => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          const loading = document.getElementById('loading');
          if (loading) loading.style.display = 'none';
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    });
  </script>

</body>
</html>
